name: yuejuan-macos

on:
  workflow_dispatch:
    inputs:
      quality:
        description: 'Build quality'
        required: true
        type: choice
        options:
          - stable
          - insider
        default: insider
      branch:
        description: 'Git branch to build'
        required: false
        type: string
        default: master

run-name: yuejuan-macos (quality=${{ inputs.quality }}, branch=${{ inputs.branch }})

env:
  APP_NAME: Yuejuan
  APP_QUALITY: ${{ inputs.quality }}
  ASSETS_REPOSITORY: https://github.com/qinglion/yuejuan-binaries
  VERSIONS_REPOSITORY: https://github.com/qinglion/yuejuan-versions

jobs:
  prepare-renderer:
    name: Prepare renderer (Node 14)
    runs-on: macos-15-intel
    env:
      OS_NAME: osx
      VSCODE_ARCH: x64
      BUILD_STAGE: renderer-only
      RENDERER_DIST_OUT: ./renderer-dist.tar.gz
      npm_config_node_sqlite3_binary_host_mirror: https://registry.npmmirror.com/-/binary/sqlite3/
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Setup Node.js 14 (fermium)
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build renderer (webpack)
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          APP_BRANCH: ${{ inputs.branch }}
        run: bash build.sh

      - name: Upload renderer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuejuan-renderer-dist
          path: renderer-dist.tar.gz
          retention-days: 1

  package:
    name: Package ${{ matrix.arch }}
    needs: prepare-renderer
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      OS_NAME: osx
      VSCODE_ARCH: ${{ matrix.arch }}
      BUILD_STAGE: package-only
      RENDERER_DIST_TARBALL: ${{ github.workspace }}/renderer-dist.tar.gz
      npm_config_arch: ${{ matrix.arch }}
      npm_config_target_arch: ${{ matrix.arch }}
      npm_config_node_sqlite3_binary_host_mirror: https://registry.npmmirror.com/-/binary/sqlite3/
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download renderer artifact
        uses: actions/download-artifact@v4
        with:
          name: yuejuan-renderer-dist
          path: ${{ github.workspace }}

      - name: Build and collect assets
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          CERTIFICATE_OSX_P12_DATA: ${{ secrets.CERTIFICATE_OSX_P12_DATA }}
          CERTIFICATE_OSX_P12_PASSWORD: ${{ secrets.CERTIFICATE_OSX_P12_PASSWORD }}
          CERTIFICATE_OSX_ID: ${{ secrets.CERTIFICATE_OSX_ID }}
          CERTIFICATE_OSX_APP_PASSWORD: ${{ secrets.CERTIFICATE_OSX_APP_PASSWORD }}
          CERTIFICATE_OSX_TEAM_ID: ${{ secrets.CERTIFICATE_OSX_TEAM_ID }}
          APP_BRANCH: ${{ inputs.branch }}
        run: bash build.sh

      - name: Prepare checksums
        run: bash prepare_checksums.sh

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          VSCODE_PLATFORM: darwin
          PUBLIC_DOWNLOAD_DOMAIN: d.qinglion.com
        run: bash upload_to_oss.sh

      - name: Update versions repo
        env:
          SHOULD_BUILD: 'yes'
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PUBLIC_DOWNLOAD_DOMAIN: ${{ secrets.PUBLIC_DOWNLOAD_DOMAIN }}
          VSCODE_PLATFORM: darwin
          APP_BRANCH: ${{ inputs.branch }}
        run: bash release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yuejuan-macos-${{ matrix.arch }}
          path: assets/
          retention-days: 7
